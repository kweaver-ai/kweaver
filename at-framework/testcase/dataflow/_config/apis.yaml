# automation服务API接口定义
# 组合算子相关
- name: 创建组合算子
  url: /api/automation/v1/operators
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

# 数据流相关
- name: 新增数据流
  url: /api/automation/v1/data-flow/flow
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 更新数据流
  url: /api/automation/v1/data-flow/flow/${dag_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取数据流详情
  url: /api/automation/v1/dag/${dag_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取历史版本列表
  url: /api/automation/v1/dags/${dag_id}/versions
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取下一个版本号
  url: /api/automation/v1/dags/${dag_id}/versions/next
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 回退历史版本
  url: /api/automation/v1/dags/${dag_id}/versions/${version_id}/rollback
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

# dataflow-doc文件管理相关(v2)
- name: 运行数据流触发文件处理
  url: /api/automation/v2/dataflow-doc/trigger/${dag_id}
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'
  multipart: true

- name: 获取文件列表
  url: /api/automation/v2/dataflow-doc/files
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取单个文件信息
  url: /api/automation/v2/dataflow-doc/files/${file_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取文件下载链接
  url: /api/automation/v2/dataflow-doc/files/${file_id}/download
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'