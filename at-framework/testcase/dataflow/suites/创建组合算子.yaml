- name: Positive_创建组合算子_sync_nodes场景
  url: 创建组合算子
  body_params: |
    {
      "title": "{{ '组合算子_sync_nodes_%s' | format(random_string(6, 8)) }}",
      "description": "sync_nodes节点组合创建",
      "category": "other_category",
      "status": "published",
      "steps": [
        {"id": "0", "operator": "@trigger/form", "parameters": {"fields": [{"type": "string", "key": "str", "description": {"type": "text"}}]}},
        {"id": "2", "operator": "@internal/json/set", "parameters": {"json": "{}", "fields": [{"key": "a", "type": "string", "value": "{% raw %}{{__0.fields.str}}{% endraw %}"}]}},
        {"id": "10", "operator": "@internal/return", "parameters": {"succ": "{% raw %}{{__1.json}}{% endraw %}"}}
      ],
      "outputs": [{"description": {"type": "text"}, "type": "string", "key": "shuchu"}]
    }
  code_check: '201'
  description: sync场景 - 使用sync_nodes节点组合创建算子

